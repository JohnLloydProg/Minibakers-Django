<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Pacifico"
      rel="stylesheet"
    />
    <link href="https://fonts.cdnfonts.com/css/tw-cen-mt" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        background-color: #faf9e7;
        font-family: "Tw Cen MT", sans-serif;
        color: #35200f;
      }

      .checkout-shell {
        width: 88vw;
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 0 60px 0;
      }

      .checkout-header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 35px;
      }

      .checkout-title {
        flex: 1;
        margin: 0;
        text-align: center;
        font-family: "Pacifico", sans-serif;
        font-size: 42px;
        color: #983236;
      }

      .checkout-header-space {
        width: 110px;
      }

      .checkout-back-anchor {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: 2px solid #983236;
        background-color: #983236;
        color: #faf9e7;
        text-decoration: none;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .checkout-back-anchor:hover {
        background-color: #faf9e7;
        color: #983236;
        text-decoration: none;
      }

      .checkout-back-anchor svg {
        transition: transform 0.3s ease;
      }

      .checkout-back-anchor:hover svg {
        transform: translateX(-4px);
      }

      .checkout-panel {
        background-color: #fffdf7;
        border: 2px solid #eadfcb;
        border-radius: 22px;
        padding: 28px;
        box-shadow: 0 8px 22px rgba(53, 32, 15, 0.08);
        height: 100%;
      }

      .checkout-panel-title {
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: bold;
        color: #983236;
      }

      .checkout-table-wrap {
        overflow-x: auto;
      }

      .checkout-table {
        width: 100%;
        margin-bottom: 0;
      }

      .checkout-table th,
      .checkout-table td {
        text-align: center;
        vertical-align: middle;
        padding: 14px 12px;
        font-size: 17px;
      }

      .checkout-table thead th {
        background-color: #983236;
        color: #faf9e7;
        border: none;
      }

      .checkout-table thead th:first-child {
        border-top-left-radius: 12px;
      }

      .checkout-table thead th:last-child {
        border-top-right-radius: 12px;
      }

      .checkout-table tbody td {
        border-top: 1px solid #eadfcb;
      }

      .checkout-final-row td {
        border-top: 2px solid #35200f !important;
        background-color: #faf9e7;
        font-weight: bold;
        font-size: 18px;
      }

      .checkout-field-group {
        margin-bottom: 18px;
      }

      .checkout-field-label {
        display: block;
        margin-bottom: 8px;
        font-size: 18px;
        font-weight: bold;
        color: #35200f;
      }

      .checkout-input,
      .checkout-select,
      .checkout-textarea {
        width: 100%;
        border: 2px solid #e2d8c9;
        border-radius: 16px;
        background-color: #fffdf7;
        color: #35200f;
        font-size: 16px;
        transition: all 0.2s ease;
        outline: none;
      }

      .checkout-input,
      .checkout-select {
        height: 54px;
        padding: 0 16px;
      }

      .checkout-textarea {
        min-height: 120px;
        padding: 14px 16px;
        resize: none;
      }

      .checkout-input:focus,
      .checkout-select:focus,
      .checkout-textarea:focus {
        border-color: #983236;
        background-color: #ffffff;
        box-shadow: none;
      }

      .checkout-select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding-right: 48px;
        background-image: url("data:image/svg+xml;utf8,<svg fill='%23983236' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
        background-repeat: no-repeat;
        background-position: right 14px center;
        background-size: 18px;
        cursor: pointer;
      }

      .checkout-submit-btn {
        width: 100%;
        border: 2px solid #983236;
        border-radius: 999px;
        background-color: #983236;
        color: #faf9e7;
        font-size: 18px;
        font-weight: bold;
        padding: 13px 24px;
        transition: all 0.3s ease;
      }

      .checkout-submit-btn:hover {
        background-color: #faf9e7;
        color: #983236;
      }

      @media (max-width: 991px) {
        .checkout-shell {
          width: 94vw;
          padding: 24px 0 40px 0;
        }

        .checkout-header-row {
          flex-wrap: wrap;
          justify-content: center;
        }

        .checkout-title {
          width: 100%;
          order: -1;
          font-size: 34px;
          margin-bottom: 6px;
        }

        .checkout-header-space {
          display: none;
        }

        .checkout-panel {
          margin-bottom: 20px;
        }

        .checkout-table th,
        .checkout-table td {
          font-size: 14px;
          padding: 10px 8px;
        }

        .checkout-panel-title {
          font-size: 24px;
        }

        .checkout-field-label {
          font-size: 16px;
        }

        .checkout-input,
        .checkout-select,
        .checkout-textarea {
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="checkout-shell">
      <div class="checkout-header-row">
        <a href="javascript:history.back()" class="checkout-back-anchor">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M15 8a.5.5 0 0 1-.5.5H3.707l3.147 3.146a.5.5 0 0 1-.708.708l-4-4a.5.5 0 0 1 0-.708l4-4a.5.5 0 1 1 .708.708L3.707 7.5H14.5A.5.5 0 0 1 15 8z"
            />
          </svg>
          Back
        </a>

        <h1 class="checkout-title">Checkout</h1>

        <div class="checkout-header-space"></div>
      </div>

      <div class="row">
        <div class="col-lg-8 mb-4 mb-lg-0">
          <div class="checkout-panel">
            <div class="checkout-panel-title">Your Cart</div>

            <div class="checkout-table-wrap">
              <table class="checkout-table">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
                  {% for item in cart_items %}
                  <tr>
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>₱{{ item.product.price }}</td>
                    <td>₱{{ item.total_price }}</td>
                  </tr>
                  {% endfor %}
                  <tr class="checkout-final-row">
                    <td colspan="3"><strong>Total</strong></td>
                    <td><strong>₱{{ total_price }}</strong></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="checkout-panel">
            <div class="checkout-panel-title">Order Details</div>

            <form method="POST" action="{% url 'create_order' %}">
              {% csrf_token %}

              <div class="checkout-field-group">
                <label for="remarks" class="checkout-field-label"
                  >Remarks</label
                >
                <textarea
                  id="remarks"
                  name="remarks"
                  class="checkout-textarea"
                  placeholder="Enter any special instructions here"
                ></textarea>
              </div>

              <div class="checkout-field-group">
                <label for="pickup" class="checkout-field-label">Pickup</label>
                <select id="pickup" name="pickup" class="checkout-select">
                  <option value="True">Yes</option>
                  <option value="False">No</option>
                </select>
              </div>

              <input
                type="hidden"
                name="total_price"
                value="{{ total_price }}"
              />

              <div class="checkout-field-group">
                <label for="payment_method" class="checkout-field-label">
                  Payment Method
                </label>
                <select
                  id="payment_method"
                  name="payment_method"
                  class="checkout-select"
                >
                  <option value="Gcash">Gcash</option>
                  <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
              </div>

              <button type="submit" class="checkout-submit-btn">
                Place Order
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
