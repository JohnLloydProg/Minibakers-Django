{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact Us</title>

    <link
      link
      rel="stylesheet"
      href="{% static 'css/cssfile.css' %}"
      type="text/css"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      .contactform {
        width: 80%;
        margin: 20px auto;
        background-color: #faf9e7;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: 3px;
        border-color: #983236;
        border-style: solid;
      }

      h1.contactus {
        text-align: center;
        color: #333;
        font-family: pacifico;
      }

      .contact-form {
        max-width: 500px;
        margin: 0 auto;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .form-group textarea {
        resize: none;
        height: 150px;
      }

      button {
        padding: 10px 20px;
        background-color: #800000;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background-color: #a24857;
      }
    </style>
  </head>

  <body>
    <div class="maincontent">
      {% include "header.html" %}

      <!-->	Dito nyo lagay content	-->
      <div class="container">
        <br />
        <br />
        <br />
        <br />

        <br />
        <div class="contactform">
          <h1 class="contactus">Have any suggestions?</h1>
          <div class="contact-form">
            <form method="post">
              {% csrf_token %}
              <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
              </div>
              <div class="form-group">
                <button type="submit">Send Message</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <br />
      <br />

      {% include "footer.html" %}
    </div>

    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>

    <script>
      $(document).ready(function () {
        const multipleCardCarousel = document.querySelector("#carousel1");
        if (window.matchMedia("(min-width: 768px)").matches) {
          var carousel = new bootstrap.Carousel(multipleCardCarousel, {
            interval: false,
          });
          var carouselWidth = $(".carousel-inner")[0].scrollWidth;
          var cardWidth = $(".carousel-item").width();
          var scrollPosition = 0;
          $("#carousel1 .carousel-control-next").on("click", function () {
            if (scrollPosition < carouselWidth - cardWidth * 4) {
              scrollPosition += cardWidth;
              $("#carousel1 .carousel-inner").animate(
                { scrollLeft: scrollPosition },
                600,
              );
            }
          });
          $("#carousel1 .carousel-control-prev").on("click", function () {
            if (scrollPosition > 0) {
              scrollPosition -= cardWidth;
              $("#carousel1 .carousel-inner").animate(
                { scrollLeft: scrollPosition },
                600,
              );
            }
          });
        } else {
          $(multipleCardCarousel).addClass("slide");
        }
      });
    </script>

    <script>
      function redirectToProducts() {
        window.location.href = "{% url 'products' %}";
      }
    </script>
  </body>
</html>
