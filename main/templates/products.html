{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    

    <title>Products</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link href="{% static 'css/cssfile.css' %}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="{% static 'css/ionicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
</head>

<body>
<div class="maincontent"> 
	{% include "header.html" %}

    <!-->	Dito nyo lagay content	-->
    <div class="mt-5 badi" style="margin-bottom: 5em;">
        <div class="container">
            <h1 style="font-family: Pacifico; text-align: center; font-weight: bold; margin-top: 4em; margin-bottom: 1em;">Products</h1>
            {% for product_type in products%}
            <div>
                <h1 style="font-family: Pacifico;" id="cakes"> <b> {{product_type.category}} </b> </h1>
                <hr/>
                <div style="flex: content; flex-wrap: wrap;">
                    {% for product in product_type.items %}
                    <div class="product-item items" style="width: 12em;"> 
                        <a href="7.html">
                            <img src="{{product.thumbnail.url}}" alt="Product Image" class="product-image" data-toggle="modal" data-target="#modal4">
                            <div class="product-details text-center">
                                <h5>{{product.name}}</h5>
                                ₱{{product.price}}
                            </div>
                        </a>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>	
    </div>

	{% include "footer.html" %}
</div>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
