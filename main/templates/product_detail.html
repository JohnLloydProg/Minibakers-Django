{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>{{ product.name }}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link href="{% static 'css/cssfile.css' %}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/IndivProdPage.css' %}">
    <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet'>
    <link href="https://fonts.cdnfonts.com/css/tw-cen-mt" rel="stylesheet">
   
</head>
<body>

<div class="maincontent">
  {% include "header.html" %}

<br><br><br><br><br>

  <div class="container">
    <!-- Main Section (Left) -->
    <div class="main-section">
      <!-- Main Image -->
      <img class="main-image" src="{{product.thumbnail.url}}" alt="{{ product.name }}" onclick="openModal();">
    
    <!-- Thumbnail Images -->
    <div class="thumbnail-container">
      {% for product_image in product.productimage_set.all %}
        <img class="thumbnail" src="{{ product_image.image.url }}" alt="Thumbnail" onclick="currentSlide();">
      {% endfor %}
    </div>
  </div>
  
    <!-- Product Info Section (Right) -->
    <div class="product-info">
      <div style="font-family: 'Pacifico'; font-size: 38px;">{{ product.name }}</div><br>
          <p>{{ product.description }}</p>
          <p><b>₱{{ product.price }}</b></p>
      <a href="contact.html"> <button class="buy-now-button">Order Now</button> </a>
    </div>
  </div>

  <!-- Modal Gallery -->
  <div class="lightbox" id="lightbox" data-images="{% for product_image in product.productimage_set.all %}'{{ product_image.image.url }}'{% if not forloop.last %},{% endif %}{% endfor %}">
    <span class="close" onclick="closeModal();">&times;</span>
    <img class="modal-content" id="modal-img">
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>
  </div>

{% include "footer.html" %}

</div>

<script>
    let slideIndex = 1;
    let images = document.getElementById('lightbox').getAttribute('data-images').split(',');

    function openModal() {
        document.getElementById('lightbox').style.display = 'flex';
        showSlides(slideIndex);
        console.log("Image URL:", images[slideIndex - 1]);
        console.log(images);  
    }

    function closeModal() {
        document.getElementById('lightbox').style.display = 'none';
    }

    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    function currentSlide(n) {
        slideIndex = n;
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        let modalImg = document.getElementById('modal-img');

        if (n > images.length) { slideIndex = 1 }
        if (n < 1) { slideIndex = images.length }

        modalImg.src = images[slideIndex - 1]; // Set the modal image to the current one
        console.log("Current Image: " + modalImg.src); // For debugging

        // Add event listener to close the modal when clicking outside the image
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target.id === 'lightbox') {
                closeModal();
            }
        });

        // Add event listeners for arrow keys
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                plusSlides(-1);
            } else if (e.key === 'ArrowRight') {
                plusSlides(1);
            }
        });
    }
</script>

</body>
</html>
